<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أفاتار طبي - OSCE Training</title>
    <link rel="stylesheet" href="style.css?v=1">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏥 أفاتار طبي تفاعلي</h1>
            <p>نظام تدريب OSCE</p>
        </header>

        <div id="setup-screen" class="screen active">
            <div class="card">
                <h2>ابدأ جلسة تدريب جديدة</h2>
                
                <div class="form-group">
                    <label>اسمك:</label>
                    <input type="text" id="student-name" placeholder="أدخل اسمك">
                </div>

                <div class="form-group">
                    <label>اللغة / Language:</label>
                    <select id="language-select">
                        <option value="ar">العربية (Arabic)</option>
                        <option value="en">English (الإنجليزية)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>اختر الحالة / Select Case:</label>
                    <select id="case-select">
                        <option value="">جاري التحميل...</option>
                    </select>
                </div>

                <button id="start-btn" class="btn-primary">ابدأ الجلسة</button>
            </div>
        </div>

        <div id="session-screen" class="screen">
            <div class="session-layout">
                <div class="video-section">
                    <div id="avatar-video" class="video-container">
                        <video id="patient-video" style="display: none; width: 100%; height: 100%; border-radius: 12px;"></video>
                        <img id="patient-image" style="display: none; width: 100%; height: 100%; border-radius: 12px; object-fit: contain;" />
                        <div id="avatar-placeholder" class="placeholder">
                            <div class="avatar-icon">👨‍⚕️</div>
                            <div class="sound-wave" id="sound-wave">
                                <span></span>
                                <span></span>
                                <span></span>
                                <span></span>
                                <span></span>
                            </div>
                            <p>المريض الافتراضي</p>
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button id="mic-btn" class="control-btn mic-btn" title="اضغط للتحدث">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                            </svg>
                        </button>
                        <button id="end-btn" class="control-btn end-btn" title="إنهاء الجلسة">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M16.5 2.25h3.75c.69 0 1.25.56 1.25 1.25v3.75c0 .69-.56 1.25-1.25 1.25h-3.75c-.69 0-1.25-.56-1.25-1.25V3.5c0-.69.56-1.25 1.25-1.25zm0 13.5h3.75c.69 0 1.25.56 1.25 1.25v3.75c0 .69-.56 1.25-1.25 1.25h-3.75c-.69 0-1.25-.56-1.25-1.25V17c0-.69.56-1.25 1.25-1.25zM3.75 2.25H7.5c.69 0 1.25.56 1.25 1.25v3.75c0 .69-.56 1.25-1.25 1.25H3.75C3.06 8.5 2.5 7.94 2.5 7.25V3.5c0-.69.56-1.25 1.25-1.25zm0 13.5H7.5c.69 0 1.25.56 1.25 1.25v3.75c0 .69-.56 1.25-1.25 1.25H3.75c-.69 0-1.25-.56-1.25-1.25V17c0-.69.56-1.25 1.25-1.25z"/>
                            </svg>
                        </button>
                    </div>
                    <p id="mic-status" class="mic-hint">🎤 اضغط على المايك للتحدث</p>
                </div>

                <div class="info-section">
                    <div class="card">
                        <h3>معلومات المريض</h3>
                        <div id="patient-info"></div>
                    </div>

                    <div class="card">
                        <h3>الشكوى الرئيسية</h3>
                        <div id="chief-complaint"></div>
                    </div>

                    <div class="card">
                        <h3>المحادثة</h3>
                        <div id="transcript" class="transcript"></div>
                        
                        <!-- Investigation Images -->
                        <div id="investigation-images" class="investigation-images"></div>
                        
                        <!-- Text input for testing -->
                        <div class="chat-input">
                            <input type="text" id="message-input" placeholder="اكتب سؤالك هنا..." />
                            <button id="send-btn" class="btn-send">إرسال</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="results-screen" class="screen">
            <div class="card">
                <div id="results-content"></div>
                <button id="new-session-btn" class="btn-primary">جلسة جديدة</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="translations.js?v=1"></script>
    <script src="app.js?v=1"></script>
</body>
</html>
